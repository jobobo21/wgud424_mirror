# .gitlab-ci.yml
# Simple working configuration - always runs

image: node:18

stages:
  - test

variables:
  MYSQL_ROOT_PASSWORD: root_password
  MYSQL_DATABASE: test_db
  DATABASE_URL: "mysql://root:root_password@mysql:3306/test_db"

test:backend:
  stage: test
  services:
    - name: mysql:8.0
      alias: mysql
      variables:
        MYSQL_ROOT_PASSWORD: root_password
        MYSQL_DATABASE: test_db
  before_script:
    - cd express
    - npm ci
    - apt-get update -qq && apt-get install -y -qq default-mysql-client
    - sleep 10  # Simple wait for MySQL
    - mysql -h mysql -u root -proot_password test_db < tests/fixtures/schema.sql
  script:
    - npm test
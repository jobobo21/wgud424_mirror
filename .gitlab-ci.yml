# .gitlab-ci.yml for .NET MAUI project with tests

# Use .NET 8 SDK image
image: mcr.microsoft.com/dotnet/sdk:8.0

stages:
  - test
  - express-test

variables:
  # .NET specific variables
  DOTNET_ROOT: "/usr/share/dotnet"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"
  # Express API test variables
  MYSQL_ROOT_PASSWORD: root_password
  MYSQL_DATABASE: test_db
  MYSQL_USER: test_user
  MYSQL_PASSWORD: test_password
  DATABASE_URL: "mysql://test_user:test_password@mysql:3306/test_db"
  NODE_ENV: test
 
# Cache .NET packages and node_modules
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - ~/.nuget/packages/
    - express/node_modules/

# .NET MAUI Test Job
test:maui:
  stage: test
  
  before_script:
    # Restore NuGet packages
    - dotnet restore
    
    # List available projects for debugging
    - dotnet sln list
    
  script:
    # Build the solution
    - echo "Building MAUI solution..."
    - dotnet build --configuration Release --no-restore
    
    # Run unit tests
    - echo "Running MAUI unit tests..."
    - dotnet test wgud424_maui_test/wgud424_maui_test.csproj 
      --configuration Release 
      --no-build 
      --verbosity normal 
      --logger "trx;LogFileName=test-results.trx" 
      --logger "console;verbosity=detailed"
      --collect:"XPlat Code Coverage"
    
  after_script:
    # Display test results summary
    - echo "Test execution completed"    
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - "**/*.trx"
      - "**/TestResults/**/*"
      - "**/coverage/**/*"
    reports:
      junit:
        - "**/*.trx"
  
  # Only run on branches and merge requests
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "stable"
    - if: $CI_COMMIT_BRANCH == "develop"

# Express API Test Job (your existing configuration)
test:express:
  stage: express-test
  image: node:18
  
  services:
    - name: mysql:8.0
      alias: mysql
      variables:
        MYSQL_ROOT_PASSWORD: $MYSQL_ROOT_PASSWORD
        MYSQL_DATABASE: $MYSQL_DATABASE
        MYSQL_USER: $MYSQL_USER
        MYSQL_PASSWORD: $MYSQL_PASSWORD
  
  before_script:
    # Navigate to express directory
    - cd express
    
    # Install dependencies
    - npm ci 
    
    # Install MySQL client
    - apt-get update -qq && apt-get install -y -qq default-mysql-client
    
    # Wait for MySQL
    - |
      echo "Waiting for MySQL..."
      for i in {1..30}; do
        if mysql -h mysql -u root -p${MYSQL_ROOT_PASSWORD} -e "SELECT 1" >/dev/null 2>&1; then
          echo "MySQL is ready!"
          break
        fi
        sleep 2
      done
    
    # Initialize database structure from SQL script
    - echo "Creating database structure..."
    - mysql -h mysql -u root -p${MYSQL_ROOT_PASSWORD} test_db < tests/fixtures/schema.sql
    
    # Load reference data if exists
    - |
      if [ -f "tests/fixtures/seed-data.sql" ]; then
        echo "Loading reference data..."
        mysql -h mysql -u root -p${MYSQL_ROOT_PASSWORD} test_db < tests/fixtures/seed-data.sql
      fi
    
    # Verify database setup
    - echo "Database tables:"
    - mysql -h mysql -u root -p${MYSQL_ROOT_PASSWORD} test_db -e "SHOW TABLES;"
    
  script:
    # Run Express API tests
    - echo "Running Express tests..."
    - npm test
    
    # Generate coverage report
    - npm run test:coverage
    
  after_script:
    # Navigate to express directory (in case we're in a different context)
    - cd express
    
    # Display coverage summary
    - cat coverage/lcov.info | head -20 || true
    
  coverage: '/Lines\s*:\s*(\d+\.\d+)%/'
  
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - express/coverage/
      - express/test-results.json
    reports:
      coverage_report:
        coverage_format: cobertura
        path: express/coverage/cobertura-coverage.xml
      junit:
        - express/test-results.xml
  
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "stable"
    - if: $CI_COMMIT_BRANCH == "develop"
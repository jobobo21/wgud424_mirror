# .gitlab-ci.yml
stages:
  - test

variables:
  # Express API test variables
  MYSQL_ROOT_PASSWORD: root_password
  MYSQL_DATABASE: test_db
  DATABASE_URL: "mysql://root:root_password@mysql:3306/test_db"
  # .NET specific variables
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"

# Cache both .NET packages and node_modules
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - ~/.nuget/packages/
    - express/node_modules/

# Express API test job
test:backend:
  stage: test
  image: node:18
  services:
    - name: mysql:8.0
      alias: mysql
      variables:
        MYSQL_ROOT_PASSWORD: root_password
        MYSQL_DATABASE: test_db
  before_script:
    - cd express
    - npm ci
    - apt-get update -qq && apt-get install -y -qq default-mysql-client
    - sleep 10
    - mysql -h mysql -u root -proot_password test_db < tests/fixtures/schema.sql
  script:
    - npm test
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - express/coverage/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: express/coverage/cobertura-coverage.xml

# .NET MAUI test job
test:maui:
  stage: test
  image: ubuntu:22.04
  before_script:
    # Update package list
    - apt-get update -qq
    
    # Install required packages
    - apt-get install -y -qq wget apt-transport-https software-properties-common curl gnupg
    
    # Add Microsoft package repository
    - wget https://packages.microsoft.com/config/ubuntu/22.04/packages-microsoft-prod.deb -O packages-microsoft-prod.deb
    - dpkg -i packages-microsoft-prod.deb
    - apt-get update -qq
    
    # Install .NET 8 SDK
    - apt-get install -y -qq dotnet-sdk-8.0
    
    # Set environment variables
    - export PATH="$PATH:/usr/share/dotnet"
    - export DOTNET_ROOT="/usr/share/dotnet"
    
    # Verify .NET installation
    - dotnet --version
    
    # Install MAUI workload
    - dotnet workload install maui --verbosity normal
    
    # Restore only the test project to avoid main MAUI project dependencies
    - dotnet restore wgud424_maui_test/wgud424_maui_test.csproj --verbosity normal
    
  script:
    # Build test project only
    - echo "Building test project..."
    - dotnet build wgud424_maui_test/wgud424_maui_test.csproj --configuration Release --no-restore --verbosity normal
    
    # Run unit tests
    - echo "Running unit tests..."
    - dotnet test wgud424_maui_test/wgud424_maui_test.csproj 
      --configuration Release 
      --no-build 
      --logger "trx;LogFileName=maui-test-results.trx"
      --results-directory ./TestResults
      --verbosity normal
      
  after_script:
    # Debug: Show what files were created
    - echo "=== Test execution completed ==="
    - find . -name "*.trx" -type f || echo "No .trx files found"
    - ls -la TestResults/ || echo "TestResults directory not found"
    - echo "=== Dotnet info ==="
    - dotnet --info || echo "Dotnet info failed"
    
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - "TestResults/**/*"
      - "**/*.trx"
    reports:
      junit:
        - "TestResults/**/*.trx"
  
  # Allow this job to fail while testing the setup
  allow_failure: true

# Pipeline rules - when to run
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "stable"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH =~ /^maui_/
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wgud424_mirror Releases</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
    <style>
        .release-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .release-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-12">
        <header class="mb-12 text-center">
            <h1 class="text-4xl font-bold text-gray-800 mb-2" id="repo-name">wgud424_mirror Releases</h1>
            <p class="text-xl text-gray-600 mb-4" id="repo-description">Loading repository information...</p>
            <div class="flex justify-center space-x-4">
                <a href="https://github.com/jobobo21/wgud424_mirror" class="text-blue-600 hover:text-blue-800 flex items-center">
                    <svg class="w-5 h-5 mr-1" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.17 6.839 9.49.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.605-3.369-1.343-3.369-1.343-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.268 2.75 1.026A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.026 2.747-1.026.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.933.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.137 20.166 22 16.42 22 12c0-5.523-4.477-10-10-10z"></path>
                    </svg>
                    View Repository
                </a>
                <a href="https://github.com/jobobo21/wgud424_mirror/issues" class="text-blue-600 hover:text-blue-800 flex items-center">
                    <svg class="w-5 h-5 mr-1" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"></path>
                    </svg>
                    Issues
                </a>
                <a href="https://github.com/jobobo21/wgud424_mirror/releases" class="text-blue-600 hover:text-blue-800 flex items-center">
                    <svg class="w-5 h-5 mr-1" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M7 14c-1.66 0-3 1.34-3 3 0 1.31-1.16 2-2 2 .92 1.22 2.49 2 4 2 2.21 0 4-1.79 4-4 0-1.66-1.34-3-3-3zm13.71-9.37l-1.34-1.34a.996.996 0 00-1.41 0L9 12.25 11.75 15l8.96-8.96a.996.996 0 000-1.41z"></path>
                    </svg>
                    All Releases
                </a>
            </div>
        </header>

        <div id="loading" class="text-center py-12">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-blue-500"></div>
            <p class="mt-2 text-gray-600">Loading releases...</p>
        </div>

        <div id="error-message" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-6"></div>
        
        <div id="releases-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Releases will be populated here -->
        </div>
        
        <div id="no-releases" class="hidden text-center py-12">
            <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path>
            </svg>
            <p class="mt-2 text-xl text-gray-500">No releases found</p>
            <p class="text-gray-400">This repository doesn't have any releases yet.</p>
        </div>
    </div>

    <footer class="bg-gray-800 text-white py-8 mt-12">
        <div class="container mx-auto px-4 text-center">
            <p>wgud424_mirror Releases</p>
            <p class="text-gray-400 text-sm mt-2">
                This page automatically fetches releases from the GitHub API.
                <br>Last updated: <span id="last-updated"></span>
            </p>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const username = 'jobobo21';
            const repository = 'wgud424_mirror';
            
            // Update the last updated date
            const now = new Date();
            document.getElementById('last-updated').textContent = now.toLocaleString();
            
            loadReleases(username, repository);
        });
        
        function loadReleases(username, repository) {
            // First, get repository information
            fetch(`https://api.github.com/repos/${username}/${repository}`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`Repository not found (${response.status})`);
                    }
                    return response.json();
                })
                .then(repoData => {
                    // Update repository information
                    document.getElementById('repo-name').textContent = repoData.name;
                    document.getElementById('repo-description').textContent = repoData.description || 'No description available';
                    
                    // Now fetch releases
                    return fetch(`https://api.github.com/repos/${username}/${repository}/releases`);
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`Failed to fetch releases (${response.status})`);
                    }
                    return response.json();
                })
                .then(data => {
                    // Hide loading indicator
                    document.getElementById('loading').classList.add('hidden');
                    
                    if (data.length === 0) {
                        document.getElementById('no-releases').classList.remove('hidden');
                        return;
                    }
                    
                    const releasesContainer = document.getElementById('releases-container');
                    
                    data.forEach(release => {
                        const releaseDate = new Date(release.published_at).toLocaleDateString('en-US', {
                            year: 'numeric',
                            month: 'long',
                            day: 'numeric'
                        });
                        
                        const isPrerelease = release.prerelease;
                        const isDraft = release.draft;
                        
                        const card = document.createElement('div');
                        card.className = 'release-card bg-white rounded-lg shadow-md overflow-hidden border border-gray-200 hover:border-blue-300';
                        
                        let statusBadge = '';
                        if (isPrerelease) {
                            statusBadge = '<span class="bg-yellow-100 text-yellow-800 text-xs font-semibold px-2.5 py-0.5 rounded ml-2">Pre-release</span>';
                        } else if (isDraft) {
                            statusBadge = '<span class="bg-gray-100 text-gray-800 text-xs font-semibold px-2.5 py-0.5 rounded ml-2">Draft</span>';
                        } else {
                            statusBadge = '<span class="bg-green-100 text-green-800 text-xs font-semibold px-2.5 py-0.5 rounded ml-2">Stable</span>';
                        }
                        
                        let assetsHTML = '';
                        if (release.assets && release.assets.length > 0) {
                            assetsHTML = '<div class="mt-4"><h4 class="text-sm font-semibold text-gray-700 mb-2">Downloads:</h4><ul class="space-y-1">';
                            
                            release.assets.forEach(asset => {
                                // Format file size
                                const sizeInKB = asset.size / 1024;
                                let formattedSize;
                                if (sizeInKB < 1024) {
                                    formattedSize = `${sizeInKB.toFixed(1)} KB`;
                                } else {
                                    formattedSize = `${(sizeInKB / 1024).toFixed(1)} MB`;
                                }
                                
                                assetsHTML += `
                                <li>
                                    <a href="${asset.browser_download_url}" class="text-blue-600 hover:text-blue-800 text-sm flex items-center">
                                        <svg class="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                                            <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd"></path>
                                        </svg>
                                        ${asset.name} <span class="text-gray-500 ml-1">(${formattedSize})</span>
                                    </a>
                                </li>`;
                            });
                            
                            assetsHTML += '</ul></div>';
                        }
                        
                        // Convert markdown description to HTML (simple version)
                        let description = release.body || 'No description provided.';
                        // Simple markdown link conversion
                        description = description.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" class="text-blue-600 hover:underline">$1</a>');
                        // Simple markdown bold conversion
                        description = description.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                        // Convert newlines to <br>
                        description = description.replace(/\n/g, '<br>');
                        
                        // Truncate description if too long
                        const maxLength = 300;
                        let truncatedDescription = description;
                        if (description.length > maxLength) {
                            truncatedDescription = description.substring(0, maxLength) + '...';
                        }
                        
                        card.innerHTML = `
                            <div class="p-6">
                                <div class="flex items-start justify-between mb-2">
                                    <h3 class="text-xl font-semibold text-gray-800">
                                        <a href="${release.html_url}" class="hover:text-blue-600">${release.name || release.tag_name}</a>
                                        ${statusBadge}
                                    </h3>
                                    <span class="text-sm text-gray-500">${releaseDate}</span>
                                </div>
                                <div class="mb-3">
                                    <span class="inline-block bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded">
                                        ${release.tag_name}
                                    </span>
                                </div>
                                <div class="text-gray-600 text-sm mb-4 release-description">
                                    ${truncatedDescription}
                                </div>
                                
                                <a href="${release.html_url}" class="text-blue-600 hover:text-blue-800 text-sm inline-flex items-center">
                                    View Release Notes
                                    <svg class="w-4 h-4 ml-1" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                                        <path fill-rule="evenodd" d="M10.293 5.293a1 1 0 011.414 0l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414-1.414L12.586 11H5a1 1 0 110-2h7.586l-2.293-2.293a1 1 0 010-1.414z" clip-rule="evenodd"></path>
                                    </svg>
                                </a>
                                
                                ${assetsHTML}
                            </div>
                        `;
                        
                        releasesContainer.appendChild(card);
                    });
                })
                .catch(error => {
                    document.getElementById('loading').classList.add('hidden');
                    showError(error.message || 'Failed to load releases');
                });
        }
        
        function showError(message) {
            const errorElement = document.getElementById('error-message');
            errorElement.textContent = message;
            errorElement.classList.remove('hidden');
        }
    </script>
</body>
</html>

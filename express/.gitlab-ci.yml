# express/.gitlab-ci.yml
# GitLab CI configuration for Express app in subdirectory

image: node:18

stages:
  - test

variables:
  MYSQL_ROOT_PASSWORD: root_password
  MYSQL_DATABASE: test_db
  MYSQL_USER: test_user
  MYSQL_PASSWORD: test_password
  DATABASE_URL: "mysql://test_user:test_password@mysql:3306/test_db"
  NODE_ENV: test

# Cache node_modules in the express directory
cache:
  key: ${CI_COMMIT_REF_SLUG}-express
  paths:
    - express/node_modules/

# Test job for Express application
test:express:
  stage: test
  services:
    - name: mysql:8.0
      alias: mysql
      variables:
        MYSQL_ROOT_PASSWORD: $MYSQL_ROOT_PASSWORD
        MYSQL_DATABASE: $MYSQL_DATABASE
        MYSQL_USER: $MYSQL_USER
        MYSQL_PASSWORD: $MYSQL_PASSWORD
  
  before_script:
    # Navigate to express directory
    - cd express
    
    # Install dependencies
    - npm ci
    
    # Install MySQL client
    - apt-get update -qq && apt-get install -y -qq default-mysql-client
    
    # Wait for MySQL
    - |
      echo "Waiting for MySQL..."
      for i in {1..30}; do
        if mysql -h mysql -u root -p${MYSQL_ROOT_PASSWORD} -e "SELECT 1" >/dev/null 2>&1; then
          echo "MySQL is ready!"
          break
        fi
        sleep 2
      done
    
    # Initialize database structure from SQL script
    - echo "Creating database structure..."
    - mysql -h mysql -u root -p${MYSQL_ROOT_PASSWORD} test_db < tests/fixtures/schema.sql
    
    # Load reference data if exists
    - |
      if [ -f "tests/fixtures/seed-data.sql" ]; then
        echo "Loading reference data..."
        mysql -h mysql -u root -p${MYSQL_ROOT_PASSWORD} test_db < tests/fixtures/seed-data.sql
      fi
    
    # Verify database setup
    - echo "Database tables:"
    - mysql -h mysql -u root -p${MYSQL_ROOT_PASSWORD} test_db -e "SHOW TABLES;"
    
  script:
    # Run tests from express directory
    - echo "Running Express tests..."
    - npm test
    
    # Generate coverage report
    - npm run test:coverage
    
  after_script:
    # Navigate to express directory (in case we're in a different context)
    - cd express
    
    # Display coverage summary
    - cat coverage/lcov.info | head -20 || true
    
  coverage: '/Lines\s*:\s*(\d+\.\d+)%/'
  
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - express/coverage/
      - express/test-results.json
    reports:
      coverage_report:
        coverage_format: cobertura
        path: express/coverage/cobertura-coverage.xml
      junit:
        - express/test-results.xml
  
  only:
    - branches
    - merge_requests
# .gitlab-ci.yml
# Fixed GitLab CI configuration

image: node:18

stages:
  - test

variables:
  MYSQL_ROOT_PASSWORD: root_password
  MYSQL_DATABASE: test_db
  MYSQL_USER: test_user
  MYSQL_PASSWORD: test_password
  DATABASE_URL: "mysql://test_user:test_password@mysql:3306/test_db"

cache:
  key: ${CI_COMMIT_REF_SLUG}-express
  paths:
    - express/node_modules/

test:backend:
  stage: test
  services:
    - name: mysql:8.0
      alias: mysql
      variables:
        MYSQL_ROOT_PASSWORD: root_password
        MYSQL_DATABASE: test_db
        MYSQL_USER: test_user
        MYSQL_PASSWORD: test_password
  before_script:
    - cd express
    - npm ci
    - apt-get update -qq && apt-get install -y -qq default-mysql-client
    - |
      for i in {1..30}; do
        if mysql -h mysql -u root -proot_password -e "SELECT 1" >/dev/null 2>&1; then
          echo "MySQL is ready"
          break
        fi
        echo "Waiting for MySQL..."
        sleep 2
      done
    - mysql -h mysql -u root -proot_password test_db < tests/fixtures/schema.sql
  script:
    - npm test
  only:
    - branches
    - merge_requests